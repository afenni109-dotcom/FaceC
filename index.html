<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceSwap · 换脸魔法</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0f;--surface:#12121a;--border:#22223a;--accent:#ff3c6e;--accent2:#6e3cff;--text:#f0f0f8;--muted:#6b6b8a; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(110,60,255,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(255,60,110,.10) 0%,transparent 60%);pointer-events:none}
  .container{position:relative;max-width:960px;margin:0 auto;padding:48px 24px}
  header{text-align:center;margin-bottom:56px}
  header h1{font-family:'Syne',sans-serif;font-size:clamp(2.4rem,6vw,4rem);font-weight:800;background:linear-gradient(135deg,#ff3c6e 0%,#6e3cff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
  header p{margin-top:12px;color:var(--muted);font-size:1rem;font-weight:300;letter-spacing:.05em}
  .upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
  @media(max-width:600px){.upload-grid{grid-template-columns:1fr}}
  .upload-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:24px;transition:border-color .3s}
  .upload-card:hover{border-color:var(--accent2)}
  .upload-card>label{display:block;font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .upload-card>label span{color:var(--accent)}
  .drop-zone{border:2px dashed var(--border);border-radius:14px;height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;background:rgba(255,255,255,.02)}
  .drop-zone:hover{border-color:var(--accent2);background:rgba(110,60,255,.06)}
  .drop-zone.has-image{border-style:solid;border-color:var(--accent2)}
  .drop-zone img{width:100%;height:100%;object-fit:cover;border-radius:12px;position:absolute;inset:0}
  .drop-zone .placeholder{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--muted);font-size:.875rem}
  .drop-zone .placeholder svg{width:36px;height:36px;opacity:.5}
  .drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
  .btn-swap{width:100%;padding:18px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);border:none;border-radius:14px;color:white;font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:all .25s}
  .btn-swap:hover{opacity:.9}
  .btn-swap:disabled{opacity:.5;cursor:not-allowed}
  .status{margin-top:20px;padding:14px 20px;border-radius:12px;font-size:.9rem;display:none}
  .status.loading{display:flex;align-items:center;gap:12px;background:rgba(110,60,255,.12);border:1px solid rgba(110,60,255,.3);color:#a78bfa}
  .status.error{display:block;background:rgba(255,60,110,.1);border:1px solid rgba(255,60,110,.3);color:#ff7ba0}
  .spinner{width:18px;height:18px;border:2px solid rgba(110,60,255,.3);border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .progress-wrap{flex:1;background:rgba(255,255,255,.08);border-radius:100px;height:6px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,#6e3cff,#ff3c6e);border-radius:100px;transition:width .5s ease;width:0%}
  .result-section{margin-top:40px;display:none}
  .result-section.show{display:block}
  .result-section h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
  .result-img-wrap{border-radius:20px;overflow:hidden;border:1.5px solid var(--accent2);box-shadow:0 0 40px rgba(110,60,255,.2)}
  .result-img-wrap img{width:100%;display:block}
  .btn-download{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:12px 24px;background:transparent;border:1.5px solid var(--accent);border-radius:10px;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-size:.875rem;text-decoration:none;cursor:pointer;transition:all .2s}
  .btn-download:hover{background:var(--accent);color:white}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>换脸魔法</h1>
    <p>上传两张照片 · AI 一键换脸 · 效果惊艳</p>
  </header>

  <div class="upload-grid">
    <div class="upload-card">
      <label>源脸照片 <span>（要复制的脸）</span></label>
      <div class="drop-zone" id="zone1">
        <div class="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16v-8m-4 4l4-4 4 4"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
          <span>点击上传</span><span style="font-size:.75rem;opacity:.6">JPG / PNG</span>
        </div>
        <input type="file" id="file1" accept="image/*" onchange="previewImage('file1','zone1')">
      </div>
    </div>
    <div class="upload-card">
      <label>目标照片 <span>（脸被替换的图）</span></label>
      <div class="drop-zone" id="zone2">
        <div class="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16v-8m-4 4l4-4 4 4"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
          <span>点击上传</span><span style="font-size:.75rem;opacity:.6">JPG / PNG</span>
        </div>
        <input type="file" id="file2" accept="image/*" onchange="previewImage('file2','zone2')">
      </div>
    </div>
  </div>

  <button class="btn-swap" onclick="doFaceSwap()">✨ 开始换脸</button>

  <div class="status loading" id="statusLoading">
    <div class="spinner"></div>
    <div style="flex:1">
      <div id="statusText" style="margin-bottom:8px">正在处理...</div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>
  </div>
  <div class="status error" id="statusError"></div>

  <div class="result-section" id="resultSection">
    <h2>换脸结果</h2>
    <div class="result-img-wrap"><img id="resultImg" src="" alt="换脸结果"></div>
    <a class="btn-download" id="downloadBtn" href="#" target="_blank">↓ 下载图片</a>
  </div>
</div>

<script>
function previewImage(fileId, zoneId) {
  const file = document.getElementById(fileId).files[0];
  if (!file) return;
  const zone = document.getElementById(zoneId);
  const reader = new FileReader();
  reader.onload = (e) => {
    zone.querySelector('.placeholder').style.display = 'none';
    let img = zone.querySelector('img');
    if (!img) { img = document.createElement('img'); zone.appendChild(img); }
    img.src = e.target.result;
    zone.classList.add('has-image');
  };
  reader.readAsDataURL(file);
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let progressInterval;
function startProgress() {
  let val = 0;
  progressInterval = setInterval(() => {
    val = Math.min(val + Math.random() * 5, 90);
    document.getElementById('progressBar').style.width = val + '%';
  }, 800);
}
function stopProgress(done) {
  clearInterval(progressInterval);
  document.getElementById('progressBar').style.width = done ? '100%' : '0%';
}

async function doFaceSwap() {
  const file1 = document.getElementById('file1').files[0];
  const file2 = document.getElementById('file2').files[0];
  document.getElementById('statusError').style.display = 'none';
  document.getElementById('resultSection').classList.remove('show');
  if (!file1 || !file2) return showError('请上传两张照片');

  document.querySelector('.btn-swap').disabled = true;
  document.getElementById('statusLoading').style.display = 'flex';
  document.getElementById('statusText').textContent = '上传图片中...';
  startProgress();

  try {
    const [img1, img2] = await Promise.all([fileToBase64(file1), fileToBase64(file2)]);
    document.getElementById('statusText').textContent = '提交换脸任务...';

    const res = await fetch('/api/swap', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ swap_image: img1, target_image: img2 })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('statusText').textContent = 'AI 换脸中，约5-15秒...';
    await pollResult(data.request_id);

  } catch (err) {
    stopProgress(false);
    document.getElementById('statusLoading').style.display = 'none';
    showError('错误：' + err.message);
  } finally {
    document.querySelector('.btn-swap').disabled = false;
  }
}

async function pollResult(request_id) {
  for (let i = 0; i < 60; i++) {
    await new Promise(r => setTimeout(r, 2000));
    document.getElementById('statusText').textContent = `AI 换脸中... 已等待 ${(i+1)*2}秒`;

    const res = await fetch(`/api/poll?request_id=${request_id}`);
    const data = await res.json();

    if (data.status === 'succeeded') {
      stopProgress(true);
      return showResult(data.output);
    }
    if (data.status === 'failed') throw new Error(data.error || '换脸失败，请重试');
  }
  throw new Error('超时，请重试');
}

function showResult(url) {
  document.getElementById('statusLoading').style.display = 'none';
  document.getElementById('resultImg').src = url;
  document.getElementById('downloadBtn').href = url;
  document.getElementById('resultSection').classList.add('show');
}

function showError(msg) {
  const el = document.getElementById('statusError');
  el.style.display = 'block';
  el.textContent = msg;
}
</script>
</body>
</html>
